# ---------------------------------------------------------------------------
# tun-proto embedded tunnel server — shipped defaults.
# Override any of these in YOUR application's application.properties.
#
# Minimal integration: just set an API key. That's it.
#   tun-proto.api-keys[0]=my-secret-key
# The tunnel then auto-starts on StartupEvent and shares your app's HTTP port.
# You need to know nothing about yamux or WebSocket framing.
# ---------------------------------------------------------------------------

tun-proto.enabled=true
tun-proto.path=/tunnels

# Unset => MOUNT on the app's HTTP server (shares the app port). This is the
# least-learning default. Set a value to bind a separate, own listener instead:
# tun-proto.port=9090

tun-proto.auth-disabled=false

# Static Bearer allowlist. Uncomment and change:
# tun-proto.api-keys[0]=change-me

tun-proto.max-stream-window=16777216
tun-proto.max-sessions=0
tun-proto.max-streams=0
tun-proto.dial-timeout=10s
tun-proto.keep-alive-interval=30s
tun-proto.keep-alive-timeout=40s
